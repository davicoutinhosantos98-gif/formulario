<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechSolutions – Fale Conosco</title>
<link rel="stylesheet" href="style.css">

</head>
<body>
<header>
<h1>TechSolutions – Fale Conosco</h1>
<p>Entre em contato com nossa equipe</p>
</header>
<div class="container">
<form id="formContato">
<label>Nome</label>
<input type="text" id="nome">
<span id="erroNome" class="erro"></span>
<label>E-mail</label>
<input type="email" id="email">
<span id="erroEmail" class="erro"></span>
<label>Telefone</label>
<input type="text" id="telefone" placeholder="(00) 00000-0000">
<span id="erroTelefone" class="erro"></span>
<label>Assunto</label>
<select id="assunto">
<option>Suporte</option>
<option>Vendas</option>
<option>Reclamação</option>
<option>Outros</option>
</select>
<label>Mensagem</label>
<textarea id="mensagem"></textarea>
<span id="erroMensagem" class="erro"></span>
<label>
<input type="checkbox" id="termos">
&nbsp;Aceito os termos de privacidade
</label>
<span id="erroTermos" class="erro"></span>
<button type="submit">Enviar</button>
</form>
</div>
<footer>
<p>© 2026 TechSolutions - Todos os direitos reservados</p>
</footer>

<script src="script.js"></script>

</body>
</html>
